name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["[0-9]*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: moribashi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: moribashi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Type-check
        run: |
          npx tsc --noEmit -p packages/common/tsconfig.json
          npx tsc --noEmit -p packages/core/tsconfig.json
          npx tsc --noEmit -p packages/cli/tsconfig.json
          npx tsc --noEmit -p packages/web/tsconfig.json
          npx tsc --noEmit -p packages/pg/tsconfig.json

      - name: Test
        run: pnpm --filter @moribashi/pg run test
        env:
          PGHOST: localhost

  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Set package versions
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Publishing version: $VERSION"
          pnpm -r --filter './packages/**' exec npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build all packages
        run: pnpm run build

      - name: Publish to npmjs
        run: pnpm -r --filter './packages/**' exec npm publish --provenance --access public
