name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Biome check (format + lint)
        run: pnpm run ci:check

      - name: Build all packages
        run: pnpm run build

      - name: Type-check
        run: pnpm run typecheck

      - name: Generate API docs (TypeDoc)
        run: pnpm run docs:api

      - name: Upload API docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          if-no-files-found: ignore
          retention-days: 14

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: moribashi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: moribashi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run test:coverage
        env:
          PGHOST: localhost

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
