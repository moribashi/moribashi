name: moribashi
services:
  moribashi-dev:
    container_name: moribashi-dev
    stdin_open: true
    tty: true
    build:
      context: "../"
      dockerfile: ".devcontainer/Dockerfile.devcontainer"
    environment:
      SHELL: /bin/bash
    # ports:
    #   - 6330:6330
    volumes:
      - ../:/workspace:rw

      - ~/.ssh:/home/node/.ssh:ro
      - ~/.gitconfig:/home/node/.gitconfig:ro

      ### Dev container gets access to host docker
      - /var/run/docker.sock:/var/run/docker.sock

      ### Credential persistence across restarts
      - ~/.devcontainers/mount/oss/secrets:/home/node/.secrets
      - ~/.devcontainers/mount/oss/claude:/home/node/.claude
      - ~/.devcontainers/mount/oss/claude.json:/home/node/.claude.json
      - ~/.config/gh:/home/node/.config/gh
      
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: moribashi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moribashi
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moribashi"]
      interval: 10s
      timeout: 5s
      retries: 5
